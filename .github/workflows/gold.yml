name: Gold Price Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉代码
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. 设置 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # 4. 恢复上一次价格文件（关键）
      - name: Restore last price
        uses: actions/cache@v4
        with:
          path: last_price.txt
          key: gold-price-cache

      # 5. 调试信息
      - name: Debug info
        run: |
          echo "[DEBUG] 当前目录:"
          pwd
          echo "[DEBUG] 文件列表:"
          ls -l
          echo "[DEBUG] Python版本:"
          python --version

      # 6. 运行程序
      - name: Run gold monitor
        env:
          PRICE_UP_THRESHOLD: "1"
          PRICE_DOWN_THRESHOLD: "1"

          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}

        run: |
          set -e
          echo "[INFO] 开始执行监控"
          python gold.py
          echo "[INFO] 执行完成"

      # 7. 保存价格文件（关键）
      - name: Save last price
        uses: actions/cache@v4
        with:
          path: last_price.txt
          key: gold-price-cache